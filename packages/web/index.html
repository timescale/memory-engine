<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Engine</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Apply the saved (or OS-preferred) theme before first paint to avoid
                        // a light-mode flash. Kept inline and dependency-free on purpose.
                        (() => {
                          let theme = null;
                          try {
                            theme = localStorage.getItem("me-theme");
                          } catch {}
                          const dark =
                            theme === "dark" ||
                            (theme !== "light" &&
                              window.matchMedia("(prefers-color-scheme: dark)").matches);
                          document.documentElement.classList.toggle("dark", dark);
                        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-full antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
