site_name: Memory Engine
site_url: http://docs.memory.build
site_description: Permanent memory for AI agents
repo_url: https://github.com/timescale/memory-engine

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font: false  # disable Google Fonts -- we self-host Geist Mono
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts: concepts.md
  - File Formats: formats.md
  - Access Control: access-control.md
  - Memory Packs: memory-packs.md
  - MCP Integration: mcp-integration.md
  - TypeScript Client: typescript-client.md
  - Troubleshooting: troubleshooting.md
  - CLI Reference:
      - me login: cli/me-login.md
      - me logout: cli/me-logout.md
      - me whoami: cli/me-whoami.md
      - me engine: cli/me-engine.md
      - me memory: cli/me-memory.md
      - me mcp: cli/me-mcp.md
      - me claude: cli/me-claude.md
      - me codex: cli/me-codex.md
      - me gemini: cli/me-gemini.md
      - me opencode: cli/me-opencode.md
      - Agent session imports: cli/agent-session-imports.md
      - me user: cli/me-user.md
      - me role: cli/me-role.md
      - me grant: cli/me-grant.md
      - me owner: cli/me-owner.md
      - me org: cli/me-org.md
      - me invitation: cli/me-invitation.md
      - me apikey: cli/me-apikey.md
      - me pack: cli/me-pack.md
      - me completions: cli/me-completions.md
  - MCP Tools:
      - me_memory_create: mcp/me_memory_create.md
      - me_memory_get: mcp/me_memory_get.md
      - me_memory_search: mcp/me_memory_search.md
      - me_memory_update: mcp/me_memory_update.md
      - me_memory_delete: mcp/me_memory_delete.md
      - me_memory_delete_tree: mcp/me_memory_delete_tree.md
      - me_memory_tree: mcp/me_memory_tree.md
