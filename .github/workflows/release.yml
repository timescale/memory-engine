name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ./bun install

      - name: Typecheck
        run: ./bun run typecheck

      - name: Lint
        run: ./bun run lint

      - name: Test (unit)
        run: find packages -name '*.test.ts' ! -name '*.integration.test.ts' -print0 | xargs -0 ./bun test

      - name: Build @memory.build/protocol
        run: ./bun run --filter '@memory.build/protocol' build

      - name: Build @memory.build/client
        run: ./bun run --filter '@memory.build/client' build

      - name: Publish @memory.build/protocol
        run: cd packages/protocol && ../../bun publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @memory.build/client
        run: cd packages/client && ../../bun publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ./bun install

      - name: Build CLI (all platforms)
        run: ./bun run build:all

      - name: Generate checksums
        run: |
          cd dist
          for file in me-*; do
            sha256sum "$file" > "${file}.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/me-*
          generate_release_notes: true
