name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ./bun install

      - name: Typecheck
        run: ./bun run typecheck

      - name: Lint
        run: ./bun run lint

      - name: Test (unit)
        run: find packages -name '*.test.ts' ! -name '*.integration.test.ts' -print0 | xargs -0 ./bun test

      - name: Build @memory.build/protocol
        run: ./bun run --filter '@memory.build/protocol' build

      - name: Build @memory.build/client
        run: ./bun run --filter '@memory.build/client' build

      - name: Publish @memory.build/protocol
        run: cd packages/protocol && ../../bun x 'npm@>=11.5.1' publish --access public

      - name: Publish @memory.build/client
        run: cd packages/client && ../../bun x 'npm@>=11.5.1' publish --access public

  build-cli:
    # Build on macOS so the darwin binary can be ad-hoc signed.
    # Unsigned Bun-compiled darwin binaries are killed by macOS at launch.
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ./bun install

      - name: Build CLI (all platforms)
        run: ./bun run build:all

      - name: Generate checksums
        run: |
          cd dist
          for file in me-*; do
            shasum -a 256 "$file" > "${file}.sha256"
          done

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: me-binaries
          path: dist/me-*

  release-cli:
    runs-on: ubuntu-latest
    needs: build-cli
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: me-binaries
          path: ./dist

      - name: List artifacts
        run: ls -la ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./dist/*
          generate_release_notes: true

  publish-cli-npm:
    runs-on: ubuntu-latest
    needs: build-cli
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: me-binaries
          path: ./dist

      - name: List artifacts
        run: ls -la ./dist

      - name: Publish to npm
        run: |
          ./bun run scripts/npm/publish.ts \
            --version "${GITHUB_REF_NAME#v}" \
            --binaries-dir ./dist

  publish-homebrew:
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - release-cli
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: me-binaries
          path: ./dist

      - name: List artifacts
        run: ls -la ./dist

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          ./bun run scripts/brew/update-formula.ts \
            --version "${GITHUB_REF_NAME#v}" \
            --binaries-dir ./dist
