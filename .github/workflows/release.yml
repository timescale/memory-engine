name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ./bun install

      # web-assets.generated.ts is produced by `build:web` and is gitignored.
      # Lint/typecheck/tests transitively import it through packages/cli/serve/.
      # Running the bundler alone (no Vite) emits an empty-map stub, which
      # satisfies the type shape without a full UI build.
      - name: Prepare embedded web assets (stub)
        run: ./bun scripts/bundle-web-assets.ts

      - name: Typecheck
        run: ./bun run typecheck

      - name: Lint
        run: ./bun run lint

      - name: Test (unit)
        run: ./bun run test:unit

      - name: Build @memory.build/protocol
        run: ./bun run --filter '@memory.build/protocol' build

      - name: Build @memory.build/client
        run: ./bun run --filter '@memory.build/client' build

      # Publish with a real npm, not `bun x npm`: npm ships `sigstore` as a
      # bundled dependency, and bunx does not install bundledDependencies, so
      # provenance generation under OIDC trusted publishing fails with
      # "Cannot find module 'sigstore'". A globally installed npm@latest keeps
      # its bundled deps intact and satisfies the >=11.5.1 OIDC requirement.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (OIDC trusted publishing, bundled sigstore)
        run: npm install -g npm@latest

      - name: Publish @memory.build/protocol
        run: cd packages/protocol && npm publish --access public

      - name: Publish @memory.build/client
        run: cd packages/client && npm publish --access public

  build-cli:
    # Build on macOS so the darwin binary can be ad-hoc signed.
    # Unsigned Bun-compiled darwin binaries are killed by macOS at launch.
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: ./bun install

      - name: Build CLI (all platforms)
        run: ./bun run build:all

      - name: Generate checksums
        run: |
          cd dist
          for file in me-*; do
            shasum -a 256 "$file" > "${file}.sha256"
          done

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: me-binaries
          path: dist/me-*

  release-cli:
    runs-on: ubuntu-latest
    needs: [build-cli, publish-npm]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          name: me-binaries
          path: ./dist

      - name: List artifacts
        run: ls -la ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./dist/*
          generate_release_notes: true

  publish-cli-npm:
    runs-on: ubuntu-latest
    needs: [build-cli, publish-npm]
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          name: me-binaries
          path: ./dist

      - name: List artifacts
        run: ls -la ./dist

      # publish.ts shells out to a real npm (see its NPM_CMD). Provide one with
      # its bundled sigstore intact for OIDC trusted publishing + provenance.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (OIDC trusted publishing, bundled sigstore)
        run: npm install -g npm@latest

      - name: Publish to npm
        run: |
          ./bun run scripts/npm/publish.ts \
            --version "${GITHUB_REF_NAME#v}" \
            --binaries-dir ./dist

  publish-homebrew:
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - release-cli
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          name: me-binaries
          path: ./dist

      - name: List artifacts
        run: ls -la ./dist

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          ./bun run scripts/brew/update-formula.ts \
            --version "${GITHUB_REF_NAME#v}" \
            --binaries-dir ./dist
