name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # TEST_CI disables conditional test skips: every gated suite runs, and
      # missing prerequisites fail loudly instead of skipping silently. The
      # OpenAI key drives the live embedding suite; a fork PR (no secrets)
      # therefore fails rather than silently testing less.
      TEST_CI: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: ./bun install
      # web-assets.generated.ts is produced by `build:web` and is gitignored.
      # Lint/typecheck/tests transitively import it through packages/cli/serve/.
      # Running the bundler alone (no Vite) is enough for CI — it emits an
      # empty map when packages/web/dist/ is absent, which satisfies the type
      # shape without the multi-second Vite build.
      - name: Prepare embedded web assets (stub)
        run: ./bun scripts/bundle-web-assets.ts
      - name: Lint
        run: ./bun run lint
      - name: Typecheck
        run: ./bun run typecheck
      - name: Test (unit)
        # Same script (and process model — --parallel) as local runs, so CI
        # can't diverge from what developers verify against.
        run: ./bun run test:unit

  integration:
    runs-on: ubuntu-latest
    env:
      # See the ci job for TEST_CI semantics. The e2e suite needs the database
      # URL (the container below) and a real OpenAI key for its embedding
      # worker (a few thousand text-embedding-3-small tokens per run).
      TEST_CI: "1"
      TEST_DATABASE_URL: postgresql://postgres@127.0.0.1:5432/postgres
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: ./bun install
      - name: Prepare embedded web assets (stub)
        run: ./bun scripts/bundle-web-assets.ts
      - name: Build Postgres image
        run: docker build -t me-postgres -f docker/Dockerfile.postgres docker/
      - name: Start Postgres
        run: |
          docker run --rm -d --name me-postgres \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -p 127.0.0.1:5432:5432 \
            me-postgres
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres && break
            sleep 1
          done
      - name: Test (integration)
        # Same script (and process model — --parallel) as local runs; the
        # suites default to postgresql://postgres@127.0.0.1:5432/postgres,
        # which is the container above. The schema cleaner that test:db runs
        # first is a no-op against the fresh container.
        run: ./bun run test:db
      - name: Test (e2e)
        # Real CLI subprocesses against a real in-process server and the
        # container above, with real OpenAI embeddings.
        run: ./bun run test:e2e
      - name: Stop Postgres
        run: docker stop me-postgres

  docker-build:
    # Build the server image the dev/prod deploy ships. The lint/typecheck/test
    # jobs never touch packages/server/Dockerfile, so workspace drift — e.g. a
    # COPY of a retired package — passes CI and only fails at deploy time. This
    # job is that guard: it builds the image (no push) so the Dockerfile breaks
    # here instead. Mirrors the build the deploy dispatches to tiger-agents-deploy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build server image (no push)
        run: docker build -f packages/server/Dockerfile -t me-server:ci .

  publish-build:
    # Build the publishable npm packages exactly as the Release workflow's
    # publish-npm job does. Those builds (each package's hardcoded bundler entry
    # list + tsc) only ran on a release tag, so a stale entry — e.g. a renamed or
    # deleted module still listed in protocol's build:js — passed every PR and
    # only broke mid-release. This job is that guard: the build fails here instead.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: ./bun install
      - name: Prepare embedded web assets (stub)
        run: ./bun scripts/bundle-web-assets.ts
      - name: Build @memory.build/protocol
        run: ./bun run --filter '@memory.build/protocol' build
      - name: Build @memory.build/client
        run: ./bun run --filter '@memory.build/client' build
