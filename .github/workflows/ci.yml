name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format
        run: bun run format

      - name: Typecheck
        run: bun run typecheck

      - name: Test (unit)
        run: find packages -name '*.test.ts' ! -name '*.integration.test.ts' -print0 | xargs -0 bun test

  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Postgres image
        run: docker build -t me-postgres -f docker/Dockerfile.postgres docker/

      - name: Start Postgres
        run: |
          docker run -d --name me-postgres \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -p 127.0.0.1:5432:5432 \
            me-postgres

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5432 -U postgres && break
            sleep 1
          done

      - name: Test (integration)
        run: bun test packages/engine/db.integration.test.ts packages/engine/migrate/migrate.integration.test.ts
