name: Validate Packs

on:
  push:
    branches: [main]
    paths:
      - "packs/**"
      - "scripts/validate-packs.ts"
      - "scripts/pack-uuids.ts"
      - "scripts/package.json"
      - "packages/cli/parsers/pack.ts"
      - "packages/cli/parsers/validation.ts"
      - "packages/cli/parsers/index.ts"
      - ".github/workflows/validate-packs.yml"
  pull_request:
    paths:
      - "packs/**"
      - "scripts/validate-packs.ts"
      - "scripts/pack-uuids.ts"
      - "scripts/package.json"
      - "packages/cli/parsers/pack.ts"
      - "packages/cli/parsers/validation.ts"
      - "packages/cli/parsers/index.ts"
      - ".github/workflows/validate-packs.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: ./bun install
      - name: Validate packs
        run: ./bun run scripts/validate-packs.ts
