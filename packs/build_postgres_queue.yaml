    content: |
      # Building Task Queues with PostgreSQL — Overview

      PostgreSQL can serve as a robust task queue without requiring external message brokers. This guide covers the patterns, trade-offs, and implementation details for production-grade queues.

      ## Why Use Postgres for Queuing

      - **No additional infrastructure** — Use your existing Postgres instance
      - **Transactional guarantees** — Enqueue tasks as part of business transactions
      - **Queryable state** — Inspect queue depth, task history with familiar SQL
      - **ACID semantics** — Exactly-once delivery with row-level locking

      For complex routing, fan-out, pub/sub, or multi-datacenter distribution, consider dedicated message brokers.

      ## Core Concepts

      | Term | Definition |
      |------|------------|
      | **Task** | A unit of work stored as a row in the queue table |
      | **Claiming** | A worker acquiring exclusive access to a task |
      | **Lease** | Time-limited claim; task becomes available again if lease expires |
      | **Visibility** | Whether a task can be seen/claimed by workers |
      | **Outcome** | Final state of a task (completed, failed, cancelled, expired) |

      ## Design Decisions

      Answer these before implementing:

      1. **Claiming model?** Visibility threshold (recommended) or row lock hold
      2. **Concurrency?** SKIP LOCKED (recommended) or advisory locks
      3. **Notification?** Polling (recommended) — LISTEN/NOTIFY not for production
      4. **Task ID type?** BIGINT (most cases), UUID (distributed), UUIDv7 (PG18+)
      5. **Payload format?** JSONB (flexible), typed columns, or hybrid

      Optional features (each adds schema elements):
      6. Task kinds — `kind` column for specialized workers
      7. Deduplication — `key` column to prevent duplicates
      8. Priority — `priority` column for ordering
      9. Prerequisites — `prereqs` column for task dependencies
      10. Batch claiming — `LIMIT N` in claim query
      11. Archiving — separate archive table

      ## Implementation Steps

      1. Choose patterns using the design decisions above
      2. Design schema — me_memory_get({id: "019b0007-0005-7000-8000-000000000005"})
      3. Design indexes — me_memory_get({id: "019b0007-0006-7000-8000-000000000006"})
      4. Implement core operations: enqueue, claim, complete/fail, extend lease
      5. Set up maintenance: archiving, monitoring, alerts

