      # Optional Patterns — Priority, Batch, Archiving, Task Kinds

      Summary of optional patterns. Each adds schema elements and query complexity.

      ## Priority Queues

      Add `priority int NOT NULL DEFAULT 100` (lower = higher priority). Claim with `ORDER BY priority, vt`.

      ```sql
      CREATE INDEX ON queue (priority, vt) WHERE outcome IS NULL;
      ```

      Priority schemes: numeric bands (0=critical, 50=normal, 200=bulk), named enums, or customer-tier joins.

      **Starvation prevention:** priority aging (`ORDER BY priority - EXTRACT(EPOCH FROM (now() - created_at)) / 3600`), reserved capacity (80/20 split), or maximum wait time escalation.

      ## Batch Claiming

      Use `LIMIT N` to claim multiple tasks at once. Reduces DB round-trips for high-volume, fast-task queues.

      ```sql
      -- Claim up to 10 tasks atomically
      WITH candidates AS (
          SELECT id FROM queue WHERE vt <= now() AND outcome IS NULL
          ORDER BY vt LIMIT 10 FOR UPDATE SKIP LOCKED
      )
      UPDATE queue q SET vt = now() + interval '5 minutes', attempts = attempts + 1
      FROM candidates c WHERE q.id = c.id RETURNING q.*;
      ```

      Rule of thumb: batch size x avg task time should be well under lease duration. Consider adaptive sizing based on queue depth.

      ## Archiving

      Move completed tasks to a separate `queue_archive` table. Keeps active table small and fast.

      ```sql
      CREATE TABLE queue_archive (
          id bigint PRIMARY KEY,  -- No GENERATED
          -- Same columns as queue...
          archived_at timestamptz NOT NULL DEFAULT now()
      );

      -- Basic archive operation
      WITH archived AS (
          DELETE FROM queue WHERE outcome IS NOT NULL RETURNING *
      )
      INSERT INTO queue_archive SELECT *, now() FROM archived;
      ```

      With prerequisites: archive completed tasks only if no active tasks depend on them. With deduplication: once archived, the key can be reused (usually desirable).

      Consider TimescaleDB hypertables for time-partitioned archives with automatic retention.

      ## Task Kinds

      Add `kind text NOT NULL` column for routing tasks to specialized workers.

      ```sql
      CREATE INDEX ON queue (kind, vt) WHERE outcome IS NULL;
      ```

      Naming convention: lowercase with dots for hierarchy (`notification.email`, `order.charge`).

      Worker strategies:
      - **Dedicated**: one kind per worker type (`WHERE kind = $1`)
      - **Multi-kind**: related kinds per worker (`WHERE kind = ANY($1)`)
      - **Prefix-based**: hierarchy matching (`WHERE kind LIKE $1 || '%'`)
      - **Fallback**: general workers exclude specialized kinds (`WHERE kind != ALL($1)`)

      Powerful when combined with prerequisites for workflow orchestration (ETL pipelines, order processing, image processing fan-out/fan-in).

      ## Row Lock Claiming (Anti-Pattern)

      Holds `FOR UPDATE` lock for entire processing duration. Not recommended: long transactions block autovacuum, exhaust connections, no scheduling/backoff. Requires savepoints for retry tracking. Use visibility threshold instead.

      ## LISTEN/NOTIFY (Anti-Pattern)

      NOTIFY acquires a global cluster-wide AccessExclusiveLock serializing all NOTIFY-containing commits. Not for production high-throughput queues. Use polling instead. Acceptable only for very low throughput (<10 tasks/sec) or development.
