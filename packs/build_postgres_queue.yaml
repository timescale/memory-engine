  - id: "019b0007-0002-7000-8000-000000000002"
    tree: "visibility_threshold"
    meta:
      type: "reference"
      source_file: "references/patterns/visibility-threshold.md"
    content: |
      # Visibility Threshold — Recommended Claiming Pattern

      Uses a timestamp column (`vt`) to control when tasks become available for claiming. The most versatile claiming model for Postgres queues.

      ## How It Works

      1. **Enqueue**: Insert with `vt = now()` (immediate) or `vt = <future>` (scheduled)
      2. **Claim**: Worker selects tasks where `vt <= now()`, updates `vt` to future (lease expiry)
      3. **Process**: Worker processes while holding lease
      4. **Complete**: Worker marks task as completed
      5. **Lease Expiry**: If worker crashes, `vt` passes and task becomes visible again

      ## Schema

      ```sql
      CREATE TABLE queue (
          id bigint GENERATED ALWAYS AS IDENTITY PRIMARY KEY,
          payload jsonb NOT NULL,
          vt timestamptz NOT NULL DEFAULT now(),
          outcome text CHECK (outcome IN ('completed', 'failed', 'cancelled', 'expired')),
          attempts int NOT NULL DEFAULT 0,
          max_attempts int NOT NULL DEFAULT 3,
          created_at timestamptz NOT NULL DEFAULT now()
      );

      CREATE INDEX ON queue (vt) WHERE outcome IS NULL;
      ```

      ## Claiming a Task (Atomic CTE)

      ```sql
      WITH candidate AS (
          SELECT id FROM queue
          WHERE vt <= now()
            AND outcome IS NULL
            AND attempts < max_attempts
          ORDER BY vt
          LIMIT 1
          FOR UPDATE SKIP LOCKED
      )
      UPDATE queue q
      SET
          vt = now() + interval '5 minutes',
          attempts = attempts + 1
      FROM candidate c
      WHERE q.id = c.id
      RETURNING q.*;
      ```

      Key points:
      - `FOR UPDATE SKIP LOCKED` prevents contention
      - `ORDER BY vt` ensures FIFO ordering
      - Returns the full task row for processing

      ## Lease Duration

      | Task Type | Suggested Lease |
      |-----------|-----------------|
      | Quick (<10s) | 1-2 minutes |
      | Medium (10s-1min) | 5-10 minutes |
      | Long (1-10min) | 15-30 minutes |

      Too short: duplicate execution. Too long: slow failure recovery.

      ## Extending a Lease

      ```sql
      UPDATE queue SET vt = now() + interval '5 minutes'
      WHERE id = $1 AND outcome IS NULL RETURNING vt;
      ```

      ## Exponential Backoff

      ```sql
      vt = now() + (interval '1 minute' * power(2, attempts))
             + (interval '1 second' * (random() * 30))  -- jitter
      ```

      ## Scheduling Future Tasks

      ```sql
      INSERT INTO queue (payload, vt)
      VALUES ('{"type": "reminder"}', now() + interval '1 hour');
      ```

      ## Completing / Failing

      ```sql
      UPDATE queue SET outcome = 'completed' WHERE id = $1;
      UPDATE queue SET outcome = 'failed' WHERE id = $1;
      ```

      ## Advantages

      - Self-healing: crashed workers don't leave tasks stuck
      - Scheduling built-in: same mechanism handles delayed tasks
      - Backoff support: easy exponential backoff
      - Observable: query for overdue tasks

      ## Trade-offs

      - Clock dependency: relies on database server time
      - Polling required: workers must poll
      - Lease tuning: balance duration vs recovery time

