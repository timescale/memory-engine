    content: |
      # Pseudocode & CLI Fallback — Git History Extraction

      Language-agnostic algorithm and equivalent `me` CLI commands for extracting git history into memory engine. Use this when building in Python, Go, shell script, or any language without a TypeScript runtime.

      ## Algorithm Pseudocode

      ```
      function extract_git_history(config):
          repo = detect_repo_name()
          tree = build_tree_path(config.prefix, repo)

          # Step 1: Find sync cursor
          cursor = me.memory.search(meta={source: "git", repo: repo, type: "sync_cursor"}, limit=1)
          range = null
          previous_total = 0
          since_date = null

          if cursor exists:
              last_sha = cursor.meta.last_commit
              last_date = cursor.meta.last_date
              previous_total = cursor.meta.total_imported

              # Verify SHA still exists in repo
              if git_cat_file_exists(last_sha):
                  range = last_sha + "..HEAD"
              else:
                  # Force-push / rebase — fall back to date filtering
                  since_date = last_date

          # Step 2: Fetch commits (NUL-delimited format)
          commits = git_log(format="%H%x00%ae%x00%aI%x00%s", reverse=true, range=range, after=since_date, max=config.max)

          # Step 3: Filter ignored patterns
          commits = [c for c in commits if not matches_ignore_pattern(c.subject)]

          # Step 4: Bulk dedup (only when cursor SHA was missing)
          if cursor exists and range is null:
              recent = me.memory.search(meta={source: "git", repo: repo}, limit=200, order_by="desc")
              existing_shas = set(r.meta.commit for r in recent)
              commits = [c for c in commits if c.sha not in existing_shas]

          # Step 5: Batch create memories
          for batch in chunks(commits, 50):
              memories = []
              for commit in batch:
                  content = format_commit(commit, config.depth)
                  memories.append({
                      content: content,
                      tree: tree,
                      meta: {source: "git", repo: repo, commit: commit.sha, author: commit.author, branch: commit.branch},
                      temporal: {start: commit.date}
                  })
              me.memory.batchCreate(memories)

          # Step 6: Upsert sync cursor
          if any commits were created:
              last = commits[-1]
              cursor_meta = {source: "git", repo: repo, type: "sync_cursor",
                            last_commit: last.sha, last_date: last.date,
                            total_imported: previous_total + len(created)}
              if cursor exists:
                  me.memory.update(id=cursor.id, content="Sync cursor for ...", meta=cursor_meta)
              else:
                  me.memory.create(content="Sync cursor for ...", tree=tree, meta=cursor_meta)
      ```

      ## Equivalent `me` CLI Commands

      ### Find Sync Cursor

      ```bash
      me memory search \
        --meta '{"source": "git", "repo": "my_api", "type": "sync_cursor"}' \
        --limit 1
      ```

      Parse JSON output: `meta.last_commit`, `meta.last_date`, `meta.total_imported`.

      ### Verify Cursor SHA Exists

      ```bash
      git cat-file -t "$LAST_SHA" 2>/dev/null && echo "exists" || echo "missing"
      ```

      ### Create a Memory

      ```bash
      me memory create \
        --content "$(cat <<'CONTENT'
      # Add rate limiting middleware

      **Commit**: a1b2c3d
      **Author**: dev@example.com
      **Date**: 2026-02-15T10:30:00Z

      ## Files Changed
      - A src/middleware/rate-limit.ts
      - M src/server/routes.ts
      CONTENT
      )" \
        --tree "my_api.git_history" \
        --meta '{"source": "git", "repo": "my_api", "commit": "a1b2c3d4...", "author": "dev@example.com", "branch": "refs/heads/main"}' \
        --temporal '{"start": "2026-02-15T10:30:00Z"}'
      ```

      ### Shell Script Loop

      ```bash
      #!/bin/bash
      set -euo pipefail
      REPO="my_api"
      TREE="${REPO}.git_history"

      # Find sync cursor
      CURSOR_JSON=$(me memory search --meta "{\"source\":\"git\",\"repo\":\"${REPO}\",\"type\":\"sync_cursor\"}" --limit 1)
      CURSOR_ID=$(echo "$CURSOR_JSON" | jq -r '.[0].id // empty')
      LAST_SHA=$(echo "$CURSOR_JSON" | jq -r '.[0].meta.last_commit // empty')
      LAST_DATE=$(echo "$CURSOR_JSON" | jq -r '.[0].meta.last_date // empty')
      PREV_TOTAL=$(echo "$CURSOR_JSON" | jq -r '.[0].meta.total_imported // 0')

      # Determine range
      RANGE_ARGS=""
      if [ -n "$LAST_SHA" ]; then
        if git cat-file -t "$LAST_SHA" &>/dev/null; then
          RANGE_ARGS="${LAST_SHA}..HEAD"
        elif [ -n "$LAST_DATE" ]; then
          RANGE_ARGS="--after=${LAST_DATE}"
        fi
      fi

      # Fetch commits with NUL delimiter, process line by line
      CREATED=0
      LAST_PROCESSED_SHA=""
      LAST_PROCESSED_DATE=""

      git log --format="%H%x00%ae%x00%aI%x00%s" --reverse $RANGE_ARGS | while IFS= read -r LINE; do
        SHA=$(echo "$LINE" | cut -d$'\0' -f1)
        AUTHOR=$(echo "$LINE" | cut -d$'\0' -f2)
        DATE=$(echo "$LINE" | cut -d$'\0' -f3)
        SUBJECT=$(echo "$LINE" | cut -d$'\0' -f4-)

        # Skip merge commits
        echo "$SUBJECT" | grep -qE '^Merge (branch|pull request|remote-tracking)' && continue

        # Get changed files
        FILES=$(git diff-tree --no-commit-id --name-status -r "$SHA" | sed 's/^/- /')

        CONTENT="# ${SUBJECT}

      **Commit**: ${SHA:0:7}
      **Author**: ${AUTHOR}
      **Date**: ${DATE}

      ## Files Changed
      ${FILES}"

        me memory create \
          --content "$CONTENT" \
          --tree "$TREE" \
          --meta "{\"source\":\"git\",\"repo\":\"${REPO}\",\"commit\":\"${SHA}\",\"author\":\"${AUTHOR}\",\"branch\":\"refs/heads/main\"}" \
          --temporal "{\"start\":\"${DATE}\"}"

        CREATED=$((CREATED + 1))
        LAST_PROCESSED_SHA="$SHA"
        LAST_PROCESSED_DATE="$DATE"
      done

      # Upsert sync cursor
      if [ "$CREATED" -gt 0 ]; then
        TOTAL=$((PREV_TOTAL + CREATED))
        CURSOR_CONTENT="Sync cursor for ${REPO}. Last: ${LAST_PROCESSED_SHA:0:7} (${LAST_PROCESSED_DATE}). Total: ${TOTAL} commits."
        CURSOR_META="{\"source\":\"git\",\"repo\":\"${REPO}\",\"type\":\"sync_cursor\",\"last_commit\":\"${LAST_PROCESSED_SHA}\",\"last_date\":\"${LAST_PROCESSED_DATE}\",\"total_imported\":${TOTAL}}"

        if [ -n "$CURSOR_ID" ]; then
          me memory update --id "$CURSOR_ID" --content "$CURSOR_CONTENT" --meta "$CURSOR_META"
        else
          me memory create --content "$CURSOR_CONTENT" --tree "$TREE" --meta "$CURSOR_META"
        fi
      fi

      echo "Done: ${CREATED} created"
      ```

      ## Python Equivalent

      Use `subprocess.run(["git", ...])` for git commands (same `execFileSync` pattern) and `requests` or the me Python client for memory operations. The algorithm is identical — only the syntax changes.

