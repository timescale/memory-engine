    content: |
      # Pseudocode & CLI — GitHub Content Extraction

      Language-agnostic algorithm and ready-to-use shell scripts for extracting GitHub content into memory engine.

      ## Algorithm

      ```
      function extractGitHubContent(config):
          repo = detectRepo()                          # gh repo view
          treePrefix = toLtree(repo.name)              # lowercase, hyphens→underscores

          for entityType in config.sources:            # issues, prs, releases, ci
              cursor = findSyncCursor(repo, entityType)
              since = cursor?.last_updated ?? config.since

              items = fetchFromGitHub(entityType, config, since)
              items = filterBots(items)
              items = filterEmpty(items, entityType)

              for item in items:
                  content = formatContent(item, entityType)  # apply template
                  meta = buildMeta(item, entityType, repo)
                  temporal = buildTemporal(item)

                  existing = findExisting(meta)              # search by number/tag/run_id
                  if existing:
                      me_memory_update(existing.id, content, meta, temporal)
                  else:
                      me_memory_create(content, tree, meta, temporal)

              upsertSyncCursor(repo, treePrefix, entityType, latestUpdate, totalCount)
      ```

      ## Shell Script: Extract Issues

      ```bash
      #!/bin/bash
      set -euo pipefail

      REPO=${REPO:-$(gh repo view --json nameWithOwner -q '.nameWithOwner')}
      REPO_NAME=$(echo "$REPO" | cut -d'/' -f2 | tr '-' '_' | tr '[:upper:]' '[:lower:]')
      TREE="${REPO_NAME}.github.issues"
      LIMIT=${MAX_ITEMS:-100}
      SINCE=${SINCE:-""}

      SINCE_FLAG=""
      if [ -n "$SINCE" ]; then
          SINCE_FLAG="--search \"updated:>=${SINCE}\""
      fi

      gh issue list --repo "$REPO" --state all --limit "$LIMIT" --json \
          number,title,body,author,state,labels,createdAt,closedAt,comments \
          | jq -c '.[]' | while read -r item; do

          NUMBER=$(echo "$item" | jq -r '.number')
          AUTHOR=$(echo "$item" | jq -r '.author.login')
          STATE=$(echo "$item" | jq -r '.state')
          TITLE=$(echo "$item" | jq -r '.title')
          BODY=$(echo "$item" | jq -r '.body // "" | .[0:4000]')
          LABELS=$(echo "$item" | jq -r '[.labels[].name] | join(", ")')
          CREATED=$(echo "$item" | jq -r '.createdAt')
          CLOSED=$(echo "$item" | jq -r '.closedAt // empty')
          COMMENT_COUNT=$(echo "$item" | jq '.comments | length')

          # Skip bots
          if [[ "$AUTHOR" =~ \[bot\]$ ]] || [[ "$AUTHOR" == "dependabot" ]] || \
             [[ "$AUTHOR" =~ ^dependabot\[bot\]$ ]] || [[ "$AUTHOR" =~ -bot$ ]] || \
             [[ "$AUTHOR" == "github-actions" ]]; then
              continue
          fi

          # Skip empty issues
          if [ -z "$TITLE" ]; then
              continue
          fi

          # Build content (matches formatIssueContent)
          CONTENT="# #${NUMBER}: ${TITLE}\n\n"
          CONTENT+="**Repo**: ${REPO}\n"
          CONTENT+="**State**: ${STATE}\n"
          CONTENT+="**Author**: ${AUTHOR}\n"
          [ -n "$LABELS" ] && CONTENT+="**Labels**: ${LABELS}\n"
          CONTENT+="**Created**: ${CREATED:0:10}\n"
          [ -n "$CLOSED" ] && CONTENT+="**Closed**: ${CLOSED:0:10}\n"

          if [ -n "$BODY" ]; then
              CONTENT+="\n## Description\n${BODY}\n"
          fi

          # Build temporal
          TEMPORAL_START="$CREATED"
          TEMPORAL_END=""
          [ -n "$CLOSED" ] && TEMPORAL_END="$CLOSED"

          # Dedup: search by number, always update if found
          EXISTING=$(me search --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"issue\",\"number\":${NUMBER}}" --limit 1 --format json 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "[]" ]; then
              EXISTING_ID=$(echo "$EXISTING" | jq -r '.[0].id')
              me update "$EXISTING_ID" --content "$(echo -e "$CONTENT")" \
                  --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"issue\",\"number\":${NUMBER},\"author\":\"${AUTHOR}\",\"state\":\"${STATE}\"}"
          else
              TEMPORAL_FLAG="--temporal-start ${TEMPORAL_START}"
              [ -n "$TEMPORAL_END" ] && TEMPORAL_FLAG+=" --temporal-end ${TEMPORAL_END}"
              me create --tree "$TREE" --content "$(echo -e "$CONTENT")" \
                  --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"issue\",\"number\":${NUMBER},\"author\":\"${AUTHOR}\",\"state\":\"${STATE}\"}" \
                  $TEMPORAL_FLAG
          fi
      done
      ```

      ## Shell Script: Extract PRs

      ```bash
      #!/bin/bash
      set -euo pipefail

      REPO=${REPO:-$(gh repo view --json nameWithOwner -q '.nameWithOwner')}
      REPO_NAME=$(echo "$REPO" | cut -d'/' -f2 | tr '-' '_' | tr '[:upper:]' '[:lower:]')
      TREE="${REPO_NAME}.github.prs"
      LIMIT=${MAX_ITEMS:-100}

      gh pr list --repo "$REPO" --state all --limit "$LIMIT" --json \
          number,title,body,author,state,labels,createdAt,closedAt,mergedAt,comments,reviewDecision \
          | jq -c '.[]' | while read -r item; do

          NUMBER=$(echo "$item" | jq -r '.number')
          AUTHOR=$(echo "$item" | jq -r '.author.login')
          TITLE=$(echo "$item" | jq -r '.title')
          BODY=$(echo "$item" | jq -r '.body // "" | .[0:4000]')
          CREATED=$(echo "$item" | jq -r '.createdAt')
          MERGED=$(echo "$item" | jq -r '.mergedAt // empty')
          CLOSED=$(echo "$item" | jq -r '.closedAt // empty')
          REVIEW=$(echo "$item" | jq -r '.reviewDecision // "none"')

          # Skip bots
          if [[ "$AUTHOR" =~ \[bot\]$ ]] || [[ "$AUTHOR" == "dependabot" ]] || \
             [[ "$AUTHOR" =~ ^dependabot\[bot\]$ ]] || [[ "$AUTHOR" =~ -bot$ ]] || \
             [[ "$AUTHOR" == "github-actions" ]]; then
              continue
          fi

          # Determine state
          if [ -n "$MERGED" ]; then
              STATE="merged"
              TEMPORAL_END="$MERGED"
          elif [ -n "$CLOSED" ]; then
              STATE="closed"
              TEMPORAL_END="$CLOSED"
          else
              STATE="open"
              TEMPORAL_END=""
          fi

          # Build content (matches formatPRContent)
          CONTENT="# PR #${NUMBER}: ${TITLE}\n\n"
          CONTENT+="**Repo**: ${REPO}\n"
          CONTENT+="**State**: ${STATE}\n"
          CONTENT+="**Author**: ${AUTHOR}\n"
          [ "$REVIEW" != "none" ] && [ -n "$REVIEW" ] && CONTENT+="**Review Decision**: ${REVIEW}\n"
          CONTENT+="**Created**: ${CREATED:0:10}\n"
          [ -n "$MERGED" ] && CONTENT+="**Merged**: ${MERGED:0:10}\n"
          [ -n "$CLOSED" ] && [ -z "$MERGED" ] && CONTENT+="**Closed**: ${CLOSED:0:10}\n"

          if [ -n "$BODY" ]; then
              CONTENT+="\n## Description\n${BODY}\n"
          fi

          # Fetch reviews at --depth full
          if [ "${DEPTH:-full}" = "full" ]; then
              REVIEWS=$(gh api "repos/${REPO}/pulls/${NUMBER}/reviews" 2>/dev/null \
                  | jq -r '[.[] | select(.body != "" or .state != "COMMENTED")] | .[] | "**\(.user.login // "unknown")** — \(.state)\(if .body != "" then "\n\(.body)" else "" end)"' 2>/dev/null || echo "")
              [ -n "$REVIEWS" ] && CONTENT+="\n## Reviews\n${REVIEWS}\n"
          fi

          TEMPORAL_FLAG="--temporal-start ${CREATED}"
          [ -n "$TEMPORAL_END" ] && TEMPORAL_FLAG+=" --temporal-end ${TEMPORAL_END}"

          EXISTING=$(me search --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"pr\",\"number\":${NUMBER}}" --limit 1 --format json 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "[]" ]; then
              EXISTING_ID=$(echo "$EXISTING" | jq -r '.[0].id')
              me update "$EXISTING_ID" --content "$(echo -e "$CONTENT")" \
                  --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"pr\",\"number\":${NUMBER},\"author\":\"${AUTHOR}\",\"state\":\"${STATE}\"}"
          else
              me create --tree "$TREE" --content "$(echo -e "$CONTENT")" \
                  --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"pr\",\"number\":${NUMBER},\"author\":\"${AUTHOR}\",\"state\":\"${STATE}\"}" \
                  $TEMPORAL_FLAG
          fi
      done
      ```

      ## Shell Script: Extract Releases (two-step)

      ```bash
      #!/bin/bash
      set -euo pipefail

      REPO=${REPO:-$(gh repo view --json nameWithOwner -q '.nameWithOwner')}
      REPO_NAME=$(echo "$REPO" | cut -d'/' -f2 | tr '-' '_' | tr '[:upper:]' '[:lower:]')
      TREE="${REPO_NAME}.github.releases"
      LIMIT=${MAX_ITEMS:-100}

      # Step 1: List releases (body and author are NOT available in list)
      gh release list --repo "$REPO" --limit "$LIMIT" --json \
          tagName,name,createdAt,isDraft,isPrerelease \
          | jq -c '.[] | select(.isDraft == false)' | while read -r listing; do

          TAG=$(echo "$listing" | jq -r '.tagName')

          # Step 2: Fetch full details per release
          item=$(gh release view "$TAG" --repo "$REPO" --json \
              tagName,name,body,author,createdAt,isDraft,isPrerelease 2>/dev/null) || continue

          NAME=$(echo "$item" | jq -r '.name // .tagName')
          BODY=$(echo "$item" | jq -r '.body // ""')
          AUTHOR=$(echo "$item" | jq -r '.author.login')
          CREATED=$(echo "$item" | jq -r '.createdAt')
          IS_PRERELEASE=$(echo "$item" | jq -r '.isPrerelease')

          # Skip bots
          if [[ "$AUTHOR" =~ \[bot\]$ ]] || [[ "$AUTHOR" == "dependabot" ]] || \
             [[ "$AUTHOR" =~ ^dependabot\[bot\]$ ]]; then
              continue
          fi

          # Build content (matches formatReleaseContent)
          CONTENT="# Release: ${NAME}\n\n"
          CONTENT+="**Repo**: ${REPO}\n"
          CONTENT+="**Tag**: ${TAG}\n"
          CONTENT+="**Author**: ${AUTHOR}\n"
          CONTENT+="**Date**: ${CREATED:0:10}\n"
          [ "$IS_PRERELEASE" = "true" ] && CONTENT+="**Pre-release**: yes\n"

          if [ -n "$BODY" ]; then
              CONTENT+="\n## Release Notes\n${BODY}\n"
          fi

          META="{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"release\",\"tag\":\"${TAG}\",\"author\":\"${AUTHOR}\",\"prerelease\":${IS_PRERELEASE}}"

          EXISTING=$(me search --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"release\",\"tag\":\"${TAG}\"}" --limit 1 --format json 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "[]" ]; then
              EXISTING_ID=$(echo "$EXISTING" | jq -r '.[0].id')
              me update "$EXISTING_ID" --content "$(echo -e "$CONTENT")" --meta "$META"
          else
              me create --tree "$TREE" --content "$(echo -e "$CONTENT")" \
                  --meta "$META" --temporal-start "$CREATED"
          fi
      done
      ```

      ## Shell Script: Extract CI Runs

      ```bash
      #!/bin/bash
      set -euo pipefail

      REPO=${REPO:-$(gh repo view --json nameWithOwner -q '.nameWithOwner')}
      REPO_NAME=$(echo "$REPO" | cut -d'/' -f2 | tr '-' '_' | tr '[:upper:]' '[:lower:]')
      TREE="${REPO_NAME}.github.ci_runs"
      LIMIT=${MAX_ITEMS:-100}

      gh run list --repo "$REPO" --limit "$LIMIT" --json \
          databaseId,name,conclusion,createdAt,updatedAt,headBranch,event,status \
          | jq -c '.[] | select(.status == "completed")' | while read -r item; do

          RUN_ID=$(echo "$item" | jq -r '.databaseId')
          NAME=$(echo "$item" | jq -r '.name')
          CONCLUSION=$(echo "$item" | jq -r '.conclusion')
          CREATED=$(echo "$item" | jq -r '.createdAt')
          UPDATED=$(echo "$item" | jq -r '.updatedAt')
          BRANCH=$(echo "$item" | jq -r '.headBranch')
          EVENT=$(echo "$item" | jq -r '.event')

          # Build content (matches formatCIRunContent)
          CONTENT="# CI: ${NAME}\n\n"
          CONTENT+="**Repo**: ${REPO}\n"
          CONTENT+="**Workflow**: ${NAME}\n"
          CONTENT+="**Event**: ${EVENT}\n"
          CONTENT+="**Branch**: ${BRANCH}\n"
          CONTENT+="**Conclusion**: ${CONCLUSION}\n"
          CONTENT+="**Started**: ${CREATED:0:10}\n"
          CONTENT+="**Updated**: ${UPDATED:0:10}\n"

          # Fetch failed job details at --depth full
          if [ "${DEPTH:-full}" = "full" ] && [ "$CONCLUSION" = "failure" ]; then
              FAILED_JOBS=$(gh run view "$RUN_ID" --repo "$REPO" --json jobs 2>/dev/null \
                  | jq -r '.jobs[] | select(.conclusion == "failure") | "\n### \(.name)\n" + ([.steps[] | select(.conclusion == "failure") | "- **FAILED**: \(.name)"] | join("\n"))' 2>/dev/null || echo "")
              [ -n "$FAILED_JOBS" ] && CONTENT+="\n## Failed Jobs\n${FAILED_JOBS}\n"
          fi

          META="{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"ci_run\",\"run_id\":${RUN_ID},\"workflow\":\"${NAME}\",\"conclusion\":\"${CONCLUSION}\",\"branch\":\"${BRANCH}\",\"event\":\"${EVENT}\"}"

          EXISTING=$(me search --meta "{\"source\":\"github\",\"repo\":\"${REPO}\",\"entity_type\":\"ci_run\",\"run_id\":${RUN_ID}}" --limit 1 --format json 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "[]" ]; then
              EXISTING_ID=$(echo "$EXISTING" | jq -r '.[0].id')
              me update "$EXISTING_ID" --content "$(echo -e "$CONTENT")" --meta "$META"
          else
              me create --tree "$TREE" --content "$(echo -e "$CONTENT")" \
                  --meta "$META" --temporal-start "$CREATED" --temporal-end "$UPDATED"
          fi
      done
      ```

