    tree: "schema"
    meta:
      type: "reference"
      topic: "github-content-schema"
    content: |
      # Schema Conventions — GitHub Content Memories

      This reference defines tree paths, meta fields, temporal mapping, and content templates for GitHub issues, PRs, releases, and CI runs stored in memory engine.

      ## Tree Paths

      All GitHub content lives under `<treePrefix>.github.<entity_type>`:

      | Entity | Tree Path |
      |--------|-----------|
      | Issues | `<treePrefix>.github.issues` |
      | Pull Requests | `<treePrefix>.github.prs` |
      | Releases | `<treePrefix>.github.releases` |
      | CI Runs | `<treePrefix>.github.ci_runs` |
      | Sync Cursors | `<treePrefix>.github._sync` |

      Example: issue #42 in repo `my_project` → tree: `my_project.github.issues`

      All memories for one entity type share the same tree path. Individual items are distinguished by `meta.number` (issues/PRs), `meta.tag` (releases), or `meta.run_id` (CI runs).

      ## Meta Fields

      ### Common Fields (all entity types)

      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      | `source` | string | Yes | Always `"github"` |
      | `repo` | string | Yes | `"owner/repo"` format (e.g., `"timescale/pg_textsearch"`) |
      | `entity_type` | string | Yes | `"issue"`, `"pr"`, `"release"`, or `"ci_run"` |
      | `author` | string | Yes | GitHub login of the creator |

      ### Issues and PRs

      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      | `number` | number | Yes | Issue/PR number (e.g., `42`) |
      | `state` | string | Yes | `"open"`, `"closed"`, or `"merged"` (PRs only) |
      | `labels` | array | No | Label names as strings (e.g., `["bug", "p1"]`) |
      | `review_decision` | string | No | PRs only: `"APPROVED"`, `"CHANGES_REQUESTED"`, `"REVIEW_REQUIRED"`, or empty |

      ### Releases

      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      | `tag` | string | Yes | Release tag (e.g., `"v1.2.3"`) |
      | `prerelease` | boolean | Yes | `true` if pre-release, `false` otherwise |

      ### CI Runs

      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      | `run_id` | number | Yes | GitHub Actions run database ID |
      | `workflow` | string | Yes | Workflow name (e.g., `"CI"`) |
      | `conclusion` | string | Yes | `"success"`, `"failure"`, `"cancelled"`, etc. |
      | `branch` | string | Yes | Head branch name |
      | `event` | string | Yes | Trigger event: `"push"`, `"pull_request"`, etc. |

      ### Sync Cursors

      | Field | Type | Required | Description |
      |-------|------|----------|-------------|
      | `type` | string | Yes | Always `"sync_cursor"` |
      | `entity_type` | string | Yes | Source being tracked: `"issues"`, `"prs"`, `"releases"`, `"ci_runs"` |
      | `last_updated` | string | Yes | ISO timestamp of last processed item |
      | `total_imported` | number | Yes | Running count of items imported |

      ## Temporal Mapping

      | Entity State | `temporal.start` | `temporal.end` |
      |-------------|-------------------|----------------|
      | Open issue/PR | `createdAt` | *(omitted)* |
      | Closed issue | `createdAt` | `closedAt` |
      | Merged PR | `createdAt` | `mergedAt` |
      | Closed PR (not merged) | `createdAt` | `closedAt` |
      | Release | `createdAt` | *(omitted)* |
      | CI Run | `createdAt` | `updatedAt` |

      Temporal ranges enable queries like:
      - "issues resolved last week" → `temporal: {within: ["2025-01-20", "2025-01-27"]}`
      - "PRs open during the outage" → `temporal: {contains: "2025-01-15T03:00:00Z"}`

      ## Content Templates

      ### Issue

      ```
      # #<number>: <title>

      **Repo**: <owner/repo>
      **State**: <open|closed>
      **Author**: <login>
      **Labels**: <label1>, <label2>
      **Created**: <date>
      **Closed**: <date> (if closed)

      ## Description
      <body — truncated to 4000 chars if needed>

      ## Comments
      **<author>** (<date>):
      <comment body>

      [... N comments condensed ...]
      ```

      ### Pull Request

      ```
      # PR #<number>: <title>

      **Repo**: <owner/repo>
      **State**: <open|closed|merged>
      **Author**: <login>
      **Labels**: <label1>, <label2>
      **Review Decision**: <APPROVED|CHANGES_REQUESTED|REVIEW_REQUIRED>
      **Created**: <date>
      **Merged**: <date> (if merged) | **Closed**: <date> (if closed)

      ## Description
      <body — truncated to 4000 chars if needed>

      ## Reviews
      **<reviewer>** — <STATE>
      <review body>

      ## Comments
      **<author>** (<date>):
      <comment body>

      [... N comments condensed ...]
      ```

      ### Release

      ```
      # Release: <name or tagName>

      **Repo**: <owner/repo>
      **Tag**: <tagName>
      **Author**: <login>
      **Date**: <date>
      **Pre-release**: yes (if prerelease)

      ## Release Notes
      <body — release notes>
      ```

      ### CI Run

      ```
      # CI: <workflow name>

      **Repo**: <owner/repo>
      **Workflow**: <name>
      **Event**: <push|pull_request|...>
      **Branch**: <headBranch>
      **Conclusion**: <success|failure|cancelled>
      **Started**: <createdAt>
      **Updated**: <updatedAt>
      **Duration**: <Nm Ns>

      ## Failed Jobs (if conclusion=failure and depth=full)

      ### <job name>
      - **FAILED**: <step name>
      ```

      ## Search Patterns

      **Find a specific issue by number:**
      ```
      me_memory_search({meta: {source: "github", repo: "owner/repo", entity_type: "issue", number: 42}})
      ```

      **Find all open bugs:**
      ```
      me_memory_search({meta: {source: "github", entity_type: "issue", state: "open", labels: ["bug"]}})
      ```

      **Find PRs by concept:**
      ```
      me_memory_search({semantic: "authentication refactor", meta: {source: "github", entity_type: "pr"}})
      ```

      **Find releases by tag:**
      ```
      me_memory_search({meta: {source: "github", entity_type: "release", tag: "v1.2.3"}})
      ```

      **Find failed CI runs:**
      ```
      me_memory_search({meta: {source: "github", entity_type: "ci_run", conclusion: "failure"}})
      ```

      **Find CI runs for a branch:**
      ```
      me_memory_search({meta: {source: "github", entity_type: "ci_run", branch: "main"}})
      ```

      **Issues resolved in a time range:**
      ```
      me_memory_search({
        meta: {source: "github", entity_type: "issue", state: "closed"},
        temporal: {within: ["2025-01-01", "2025-02-01"]}
      })
      ```

      **Check sync cursor for a source:**
      ```
      me_memory_search({meta: {source: "github", repo: "owner/repo", type: "sync_cursor", entity_type: "issues"}})
      ```

      **Browse all GitHub content for a repo:**
      ```
      me_memory_search({tree: "my_project.github.*", meta: {source: "github"}})
      ```

      ## Interop with git_history

      The `git_history` pack stores commit memories under `<treePrefix>.git`. GitHub content lives under `<treePrefix>.github`. Both use the same `treePrefix`, enabling combined queries:

      ```
      me_memory_search({tree: "my_project.*", semantic: "fix authentication bug"})
      ```

      **Note on repo identification:** `git_history` uses `meta.repo` as a plain repo name (e.g., `"my_project"`), while `github_content` uses `owner/repo` format (e.g., `"timescale/my_project"`). This distinction is intentional — GitHub content needs the owner to distinguish forks and enable cross-org queries. When joining data across packs, match on `treePrefix` rather than `meta.repo`.

