    content: |
      # GitHub Content Extraction — Issues, PRs, Releases, and CI Runs

      You have access to memory engine MCP tools and a GitHub repository. This skill teaches you to extract GitHub issues, pull requests, releases, and CI workflow runs into memory engine for semantic search, temporal queries, and cross-referencing with code.

      ## Prerequisites

      1. **me server running** with embedding daemon active
      2. **`gh` CLI** authenticated (`gh auth status` must succeed)
      3. **Repository context** — run from a directory with a GitHub remote, or specify `--repo owner/repo`
      4. **`@memoryengine/client` SDK** — a working integration exists at `integrations/gh-sync/`

      ## What It Does

      Fetches structured data from GitHub's API via the `gh` CLI, transforms each issue, PR, release, and CI run into a memory with rich metadata, and stores them in memory engine. The embedding pipeline handles semantic search automatically. Sync cursors track progress for incremental updates.

      ## Configuration Options

      These map to the `gh-sync` CLI flags:

      | Flag | Default | Description |
      |------|---------|-------------|
      | `--repo <owner/repo>` | auto-detect | GitHub repo (from git remote via `gh`) |
      | `--prefix <tree.path>` | auto-detect | ltree-safe project name (e.g., `my_project`) |
      | `--sources <list>` | `issues,prs,releases,ci` | Comma-separated entity types to sync |
      | `--max <n>` | `100` | Maximum items per source per run |
      | `--state <state>` | `all` | Filter: `open`, `closed`, `merged`, `all` |
      | `--since <date>` | *(none)* | Only items updated after this ISO date |
      | `--depth <level>` | `full` | `summary` or `full` — full fetches PR reviews and failed CI job details |
      | `--dry-run` | `false` | Preview what would be created/updated without writing |

      ## Step 1: Detect Repository

      ```bash
      gh repo view --json nameWithOwner,name -q '.nameWithOwner'
      ```

      This gives you `owner/repo` for `meta.repo` and the repo name for tree paths. Convert the repo name to ltree-safe format (lowercase, replace hyphens with underscores).

      ## Step 2: Read Sync Cursor (Incremental)

      Before fetching, look up the sync cursor for each entity type:

      ```
      me_memory_search({
        meta: {source: "github", repo: "owner/repo", type: "sync_cursor", entity_type: "issues"},
        limit: 1
      })
      ```

      Sync cursors are stored under `<treePrefix>.github._sync` with meta fields:
      - `type: "sync_cursor"`
      - `entity_type`: the source being synced (e.g., `"issues"`, `"prs"`, `"releases"`, `"ci_runs"`)
      - `last_updated`: ISO timestamp of the most recently processed item
      - `total_imported`: running count of items imported

      If a cursor exists, use `last_updated` as the `--since` date to fetch only new/changed items.

      ## Step 3: Fetch and Transform

      For each entity type, fetch from GitHub, filter, and create memories:

      **Issues:**
      - Fetch: `gh issue list --repo owner/repo --state all --limit 100 --json number,title,body,author,state,labels,createdAt,closedAt,comments`
      - Skip: bot-created issues (author login matches bot patterns)
      - Skip: issues with no title

      **Pull Requests:**
      - Fetch: `gh pr list --repo owner/repo --state all --limit 100 --json number,title,body,author,state,labels,createdAt,closedAt,mergedAt,comments,reviewDecision`
      - Skip: bot PRs, PRs with no title
      - At `--depth full`: fetch reviews per PR via `gh api repos/{owner}/{repo}/pulls/{number}/reviews`

      **Releases (two-step):**
      - Step 1 — List: `gh release list --repo owner/repo --limit 100 --json tagName,name,createdAt,isDraft,isPrerelease`
        (`gh release list` does **not** support `body` or `author` fields)
      - Step 2 — Detail: For each non-draft release, fetch full details:
        `gh release view <tag> --repo owner/repo --json tagName,name,body,author,createdAt,isDraft,isPrerelease`
      - Skip: drafts, bot-authored releases

      **CI Runs:**
      - Fetch: `gh run list --repo owner/repo --limit 100 --json databaseId,name,conclusion,createdAt,updatedAt,headBranch,event,status`
      - Skip: runs that are not `completed`
      - At `--depth full` for failed runs: `gh run view <id> --repo owner/repo --json jobs` to get failed job/step details

      ## Step 4: Condense Comments

      For issues and PRs with many comments, condense to stay under the ~8192 token embedding limit:

      - **≤5 comments**: include all verbatim
      - **>5 comments**: include first comment, last comment, and any comments from the author
      - Add a note: `[... N comments condensed ...]`

      ## Step 5: Deduplicate

      Before creating, search for an existing memory by the entity's unique key:

      - Issues/PRs: `meta: {source: "github", repo: "owner/repo", entity_type: "issue", number: 42}`
      - Releases: `meta: {source: "github", repo: "owner/repo", entity_type: "release", tag: "v1.2.3"}`
      - CI runs: `meta: {source: "github", repo: "owner/repo", entity_type: "ci_run", run_id: 12345}`

      If found, **always update** with `me_memory_update` (no content comparison). If not found, create.

      ## Step 6: Create Memories and Update Cursor

      For each item, create a memory using the schema conventions (see `me_memory_get({id: "019b0006-0002-7000-8000-000000000002"})`).

      Batch create new memories in groups of 50. After each source completes, update the sync cursor under `<treePrefix>.github._sync`.

      ## Scope Limits

      - **100 items per source** per run (configurable with `--max`)
      - For repos with >1000 items, use `--since` or rely on sync cursors for incremental runs
      - If an issue/PR body exceeds 4000 characters, truncate with `[... truncated ...]`

      ## See Also
      - Schema conventions — `me_memory_get({id: "019b0006-0002-7000-8000-000000000002"})`
      - Pseudocode & CLI — `me_memory_get({id: "019b0006-0003-7000-8000-000000000003"})`
      - gh CLI reference — `me_memory_get({id: "019b0006-0004-7000-8000-000000000004"})`

